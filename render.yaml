# Chat BullQ — Web (Next.js 16)  ·  Blueprint Render — TIER FREE
# ⚠️ FREE: hiberna após 15min sem tráfego.
services:
  - type: web
    name: chat-bullq-web
    runtime: docker
    plan: free                 # produção: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      # URL pública da API (build-time + runtime). Ex.: https://chat-bullq-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
